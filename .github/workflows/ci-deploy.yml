name: CI e deploy

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-deploy-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  GCP_PROJECT_ID: lucas-camargo-arq-prod
  GCP_REGION: us-central1
  GCP_ARTIFACT_REPOSITORY: lucas-camargo
  PUBLIC_SERVICE: lucas-camargo-site
  ADMIN_SERVICE: lucas-camargo-admin
  R2_PRIVATE_BUCKET: lucas-camargo-private
  R2_PUBLISHED_BUCKET: lucas-camargo-published

jobs:
  validate-apps:
    name: Validar site, admin e API
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Obter o código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Preparar Node.js 20
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Preparar Yarn 1
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Instalar dependências
        run: yarn install --frozen-lockfile --non-interactive

      - name: Executar lint, testes e builds
        run: yarn run check

  validate-worker:
    name: Validar Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: cloudflare/content-worker

    steps:
      - name: Obter o código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Preparar Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: cloudflare/content-worker/yarn.lock

      - name: Preparar Yarn 1
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Instalar dependências
        run: yarn install --frozen-lockfile --non-interactive

      - name: Executar lint, testes e build
        run: yarn run check

  deploy-public-site:
    name: Publicar site no Cloud Run
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.repository == 'nathanMercess/lucas-camargo-arquitetura'
    needs:
      - validate-apps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Obter o código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validar configuração do deploy
        env:
          GCP_DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          R2_PUBLISHED_BASE_URL: ${{ vars.R2_PUBLISHED_BASE_URL }}
        run: |
          test -n "$GCP_DEPLOY_SERVICE_ACCOUNT" || { echo '::error::Variável GCP_DEPLOY_SERVICE_ACCOUNT ausente.'; exit 1; }
          test -n "$GCP_PROJECT_NUMBER" || { echo '::error::Variável GCP_PROJECT_NUMBER ausente.'; exit 1; }
          test -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" || { echo '::error::Variável GCP_WORKLOAD_IDENTITY_PROVIDER ausente.'; exit 1; }
          [[ "$R2_PUBLISHED_BASE_URL" =~ ^https://[^[:space:],]+/content$ ]] || { echo '::error::R2_PUBLISHED_BASE_URL deve ser HTTPS e terminar em /content.'; exit 1; }

      - name: Autenticar no Google Cloud sem chave
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Preparar Google Cloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: '575.0.0'

      - name: Autenticar o Docker no Artifact Registry
        run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet

      - name: Compilar e enviar a imagem do site
        env:
          IMAGE_BASE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_ARTIFACT_REPOSITORY }}/${{ env.PUBLIC_SERVICE }}
        run: |
          docker build --file Dockerfile --tag "$IMAGE_BASE:$GITHUB_SHA" .
          docker push "$IMAGE_BASE:$GITHUB_SHA"

      - name: Publicar o site público
        env:
          IMAGE_BASE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_ARTIFACT_REPOSITORY }}/${{ env.PUBLIC_SERVICE }}
          R2_PUBLISHED_BASE_URL: ${{ vars.R2_PUBLISHED_BASE_URL }}
        run: |
          gcloud run deploy "$PUBLIC_SERVICE" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE_BASE:$GITHUB_SHA" \
            --platform=managed \
            --allow-unauthenticated \
            --ingress=all \
            --execution-environment=gen1 \
            --cpu=1 \
            --memory=128Mi \
            --concurrency=80 \
            --timeout=15s \
            --min=0 \
            --max=3 \
            --cpu-throttling \
            --no-cpu-boost \
            --port=8080 \
            --service-account="lucas-site-runtime@$GCP_PROJECT_ID.iam.gserviceaccount.com" \
            --set-env-vars="CONTENT_BASE_URL=$R2_PUBLISHED_BASE_URL" \
            --labels="environment=production,managed-by=github-actions" \
            --quiet

      - name: Verificar o site publicado
        run: curl --fail --silent --show-error --retry 5 --retry-delay 5 https://lucascamargo.com/ > /dev/null

      - name: Marcar a imagem validada como produção
        env:
          IMAGE_BASE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_ARTIFACT_REPOSITORY }}/${{ env.PUBLIC_SERVICE }}
        run: gcloud artifacts docker tags add "$IMAGE_BASE:$GITHUB_SHA" "$IMAGE_BASE:production" --quiet

  deploy-admin:
    name: Publicar admin no Cloud Run
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.repository == 'nathanMercess/lucas-camargo-arquitetura'
    needs:
      - validate-apps
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Obter o código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validar configuração do deploy
        env:
          GCP_DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
          GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          R2_PUBLISHED_BASE_URL: ${{ vars.R2_PUBLISHED_BASE_URL }}
        run: |
          test -n "$GCP_DEPLOY_SERVICE_ACCOUNT" || { echo '::error::Variável GCP_DEPLOY_SERVICE_ACCOUNT ausente.'; exit 1; }
          [[ "$GCP_PROJECT_NUMBER" =~ ^[0-9]+$ ]] || { echo '::error::Variável GCP_PROJECT_NUMBER inválida.'; exit 1; }
          test -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" || { echo '::error::Variável GCP_WORKLOAD_IDENTITY_PROVIDER ausente.'; exit 1; }
          [[ "$R2_PUBLISHED_BASE_URL" =~ ^https://[^[:space:],]+/content$ ]] || { echo '::error::R2_PUBLISHED_BASE_URL deve ser HTTPS e terminar em /content.'; exit 1; }

      - name: Autenticar no Google Cloud sem chave
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Preparar Google Cloud CLI
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: '575.0.0'

      - name: Autenticar o Docker no Artifact Registry
        run: gcloud auth configure-docker "$GCP_REGION-docker.pkg.dev" --quiet

      - name: Compilar e enviar a imagem do admin
        env:
          IMAGE_BASE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_ARTIFACT_REPOSITORY }}/${{ env.ADMIN_SERVICE }}
        run: |
          docker build --file Dockerfile.admin --tag "$IMAGE_BASE:$GITHUB_SHA" .
          docker push "$IMAGE_BASE:$GITHUB_SHA"

      - name: Publicar o painel e a API
        env:
          GCP_PROJECT_NUMBER: ${{ vars.GCP_PROJECT_NUMBER }}
          IMAGE_BASE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_ARTIFACT_REPOSITORY }}/${{ env.ADMIN_SERVICE }}
          R2_PUBLISHED_BASE_URL: ${{ vars.R2_PUBLISHED_BASE_URL }}
        run: |
          ADMIN_URL="https://$ADMIN_SERVICE-$GCP_PROJECT_NUMBER.$GCP_REGION.run.app"
          IAP_AUDIENCE="/projects/$GCP_PROJECT_NUMBER/locations/$GCP_REGION/services/$ADMIN_SERVICE"
          RUNTIME_ENV="NODE_ENV=production,AUTH_MODE=iap,STORAGE_DRIVER=r2,SERVE_ADMIN_STATIC=true,ADMIN_STATIC_DIRECTORY=/app/admin,INITIAL_OWNER_EMAIL=nathan66merces@gmail.com,IAP_EXPECTED_AUDIENCE=$IAP_AUDIENCE,ADMIN_ALLOWED_ORIGINS=$ADMIN_URL,R2_PRIVATE_BUCKET=$R2_PRIVATE_BUCKET,R2_PUBLISHED_BUCKET=$R2_PUBLISHED_BUCKET,R2_PUBLISHED_BASE_URL=$R2_PUBLISHED_BASE_URL"

          gcloud run deploy "$ADMIN_SERVICE" \
            --project="$GCP_PROJECT_ID" \
            --region="$GCP_REGION" \
            --image="$IMAGE_BASE:$GITHUB_SHA" \
            --platform=managed \
            --iap \
            --no-allow-unauthenticated \
            --ingress=all \
            --execution-environment=gen1 \
            --cpu=1 \
            --memory=256Mi \
            --concurrency=4 \
            --timeout=60s \
            --min=0 \
            --max=1 \
            --cpu-throttling \
            --no-cpu-boost \
            --port=8080 \
            --service-account="lucas-admin-runtime@$GCP_PROJECT_ID.iam.gserviceaccount.com" \
            --set-env-vars="$RUNTIME_ENV" \
            --set-secrets="R2_ENDPOINT=lucas-r2-endpoint:latest,R2_ACCESS_KEY_ID=lucas-r2-access-key-id:latest,R2_SECRET_ACCESS_KEY=lucas-r2-secret-access-key:latest" \
            --labels="environment=production,managed-by=github-actions,visibility=private" \
            --quiet

      - name: Verificar o painel protegido
        run: |
          READY_STATUS="$(gcloud run services describe "$ADMIN_SERVICE" --project="$GCP_PROJECT_ID" --region="$GCP_REGION" --format='value(status.conditions[0].status)')"
          IAP_STATUS="$(gcloud run services describe "$ADMIN_SERVICE" --project="$GCP_PROJECT_ID" --region="$GCP_REGION" --format="value(metadata.annotations.'run.googleapis.com/iap-enabled')")"
          test "$READY_STATUS" = 'True' || { echo '::error::A revisão do admin não ficou pronta.'; exit 1; }
          test "$IAP_STATUS" = 'true' || { echo '::error::O IAP do admin não está ativo.'; exit 1; }

      - name: Marcar a imagem implantada como produção
        env:
          IMAGE_BASE: ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GCP_ARTIFACT_REPOSITORY }}/${{ env.ADMIN_SERVICE }}
        run: gcloud artifacts docker tags add "$IMAGE_BASE:$GITHUB_SHA" "$IMAGE_BASE:production" --quiet

  deploy-worker:
    name: Publicar Worker na Cloudflare
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      github.repository == 'nathanMercess/lucas-camargo-arquitetura'
    needs:
      - validate-worker
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: production
    permissions:
      contents: read

    defaults:
      run:
        working-directory: cloudflare/content-worker

    steps:
      - name: Obter o código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Preparar Node.js 24
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: cloudflare/content-worker/yarn.lock

      - name: Preparar Yarn 1
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Instalar dependências
        run: yarn install --frozen-lockfile --non-interactive

      - name: Validar configuração da Cloudflare
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo '::error::Variável CLOUDFLARE_ACCOUNT_ID ausente.'; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo '::error::Segredo CLOUDFLARE_API_TOKEN ausente.'; exit 1; }

      - name: Publicar o Worker
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: yarn deploy

      - name: Verificar o conteúdo publicado
        run: >-
          curl --fail --silent --show-error --retry 5 --retry-delay 5
          https://lucas-camargo-content.nathan66merces.workers.dev/content/manifest.json
          > /dev/null
