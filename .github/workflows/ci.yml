name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate-site:
    name: Validar site público
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Obter o código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Preparar Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: yarn
      - name: Preparar Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
      - name: Instalar dependências
        run: yarn install --frozen-lockfile --non-interactive
      - name: Executar validação
        run: yarn run check

  validate-worker:
    name: Validar Worker de conteúdo
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: cloudflare/content-worker
    steps:
      - name: Obter o código
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Preparar Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: yarn
          cache-dependency-path: cloudflare/content-worker/yarn.lock
      - name: Preparar Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
      - name: Instalar dependências
        run: yarn install --frozen-lockfile --non-interactive
      - name: Executar validação
        run: yarn run check
