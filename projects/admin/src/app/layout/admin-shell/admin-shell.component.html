<div class="admin-shell">
  <aside class="admin-shell-sidebar">
    <div class="admin-shell-brand">
      <span class="admin-shell-brand-monogram" aria-hidden="true">LC</span>
      <div>
        <strong>Lucas Camargo</strong>
        <span i18n>Administração</span>
      </div>
    </div>

    <p-menu class="admin-shell-navigation" styleClass="admin-navigation" [model]="navigationItems"
      aria-label="Navegação do painel" i18n-aria-label></p-menu>

    <div class="admin-shell-access">
      <p-avatar [label]="sessionInitials()" shape="circle"></p-avatar>
      <div>
        <strong>
          @if (sessionService.session()?.email; as email) {
            {{ email }}
          } @else {
            <span i18n>Sessão não identificada</span>
          }
        </strong>
        <p-tag [value]="roleLabel()" [severity]="sessionService.error() ? 'danger' : 'info'"></p-tag>
      </div>
    </div>
  </aside>

  <div class="admin-shell-workspace">
    <header class="admin-shell-header">
      <div>
        <span class="admin-shell-kicker" i18n>Estúdio de conteúdo</span>
        <p i18n>Edite, visualize, publique e reverta sem gerar uma nova versão do site.</p>
      </div>
      <div class="admin-shell-environment">
        <span class="admin-shell-environment-dot" aria-hidden="true"></span>
        <span i18n>Ambiente administrativo</span>
      </div>
    </header>

    <main class="admin-shell-main">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
