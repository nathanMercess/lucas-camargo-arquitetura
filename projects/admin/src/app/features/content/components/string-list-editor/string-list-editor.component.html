<fieldset class="string-list" [formGroup]="listForm">
  <legend>{{ label() }}</legend>
  <div formArrayName="items">
    @for (control of listForm.controls.items.controls; track $index) {
      <div class="string-list-row">
        <label><span>{{ itemLabel() }} {{ $index + 1 }}</span><textarea pTextarea [formControlName]="$index"
          rows="2"></textarea></label>
        <p-button type="button" icon="pi pi-trash" severity="danger" [text]="true"
          ariaLabel="Remover item" [disabled]="listForm.controls.items.length === 1"
          (onClick)="remove($index)" i18n-ariaLabel></p-button>
      </div>
    }
  </div>
  <p-button type="button" label="Adicionar item" severity="secondary" [outlined]="true"
    (onClick)="add()" i18n-label></p-button>
</fieldset>
