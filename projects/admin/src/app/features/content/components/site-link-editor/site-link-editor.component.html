<fieldset class="link-editor" [formGroup]="linkForm">
  <legend>{{ label() }}</legend>
  <div class="link-grid">
    <label><span>ID</span><input pInputText formControlName="id" /></label>
    <label><span i18n>Rótulo</span><input pInputText formControlName="label" /></label>
    <label class="full"><span i18n>Destino seguro</span><input pInputText formControlName="href" /></label>
    <label><span i18n>Rótulo acessível</span><input pInputText formControlName="ariaLabel" /></label>
    <div class="field"><span i18n>Abertura</span><p-select [options]="targetOptions" optionLabel="label"
      optionValue="value" formControlName="target" ariaLabel="Abertura do link"
      i18n-ariaLabel></p-select></div>
  </div>
  @if (linkForm.controls.href.invalid && linkForm.controls.href.touched) {
    <small i18n>Use âncora, caminho interno, HTTPS, e-mail ou telefone.</small>
  }
</fieldset>
