<div id="inicio" class="public-page-shell">
  <a class="public-page-shell-skip-link" href="#conteudo">
    {{ contentService.config().uiLabels.skipToContent }}
  </a>

  <div class="public-page-shell-header">
    <app-site-header [config]="headerConfig()" [navigationItems]="navigationItems()"
      [uiLabels]="contentService.config().uiLabels"
      [logoPath]="contentService.resolveMediaPath(headerConfig().logo.assetId)" />
  </div>

  @if (contentService.isLoading()) {
    <p class="public-page-shell-loading" role="status" aria-live="polite" i18n>
      Atualizando conteúdo do site.
    </p>
  }

  <main id="conteudo">
    <ng-content />
  </main>

  <app-site-footer [config]="footerConfig()" [uiLabels]="contentService.config().uiLabels"
    [logoPath]="contentService.resolveMediaPath(footerConfig().logo.assetId)" />
</div>
