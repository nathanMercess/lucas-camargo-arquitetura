<div class="portfolio-grid">
  @for (card of cards(); track card.project.id) {
    <article class="portfolio-grid-card">
      <a class="portfolio-grid-card-link" [routerLink]="['/portfolio/projeto', card.project.slug]">
        <figure class="portfolio-grid-card-figure">
          <img [src]="card.coverSrc" [alt]="card.coverAlt" [attr.aria-hidden]="card.project.cover.decorative"
            [width]="card.coverWidth" [height]="card.coverHeight"
            [style.object-position]="card.coverObjectPosition" loading="lazy" decoding="async" />
          @if (card.project.cover.caption; as caption) {
            <figcaption>{{ caption }}</figcaption>
          }
        </figure>

        <div class="portfolio-grid-card-content">
          @if (card.categories.length > 0) {
            <p class="portfolio-grid-card-categories">
              @for (category of card.categories; track category.id; let isLast = $last) {
                <span>{{ category.title }}</span>
                @if (!isLast) {
                  <span aria-hidden="true"> / </span>
                }
              }
            </p>
          }
          <h2>{{ card.project.title }}</h2>
          <p class="portfolio-grid-card-summary">{{ card.project.summary }}</p>
          <span class="portfolio-grid-card-action">
            <span i18n>Ver projeto</span>
            <b class="public-site-arrow" aria-hidden="true"></b>
          </span>
        </div>
      </a>
    </article>
  }
</div>
