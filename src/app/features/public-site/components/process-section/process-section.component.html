<section [id]="config().anchor" class="process-section" [attr.aria-labelledby]="config().id + '-title'">
  <header appRevealOnScroll>
    <p class="process-section-overline">{{ config().overline }}</p>
    <h2 [id]="config().id + '-title'">{{ config().title }}</h2>
  </header>

  <div class="process-section-grid">
    @for (step of config().steps; track step.id; let position = $index) {
      <article appRevealOnScroll [style.--reveal-delay]="position * 90 + 'ms'">
        <span>{{ step.index }}</span>
        <h3>{{ step.title }}</h3>
        <p>{{ step.description }}</p>
      </article>
    }
  </div>
</section>
