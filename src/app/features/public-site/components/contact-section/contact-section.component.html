<section [id]="config().anchor" class="contact-section" [attr.aria-labelledby]="config().id + '-title'">
  <p class="contact-section-overline">{{ config().overline }}</p>
  <h2 [id]="config().id + '-title'" appRevealOnScroll><app-rich-text [content]="config().title" /></h2>

  <a class="contact-section-cta" appRevealOnScroll style="--reveal-delay: 90ms" [href]="config().cta.href"
    [attr.aria-label]="config().cta.ariaLabel ?? config().cta.label"
    [attr.target]="config().cta.target ?? '_self'"
    [attr.rel]="config().cta.target === '_blank' ? 'noopener noreferrer' : null">
    {{ config().cta.label }}
    <span class="contact-section-cta-icon" aria-hidden="true">
      <span class="public-site-arrow"></span>
    </span>
  </a>

  <dl class="contact-section-list">
    @for (channel of config().contactChannels; track channel.id; let position = $index) {
      <div class="contact-section-item" appRevealOnScroll [style.--reveal-delay]="position * 80 + 'ms'">
        <dt>{{ channel.label }}</dt>
        <dd>
          @if (channel.href) {
            <a [href]="channel.href">{{ channel.value }}</a>
          } @else {
            <span>{{ channel.value }}</span>
          }
        </dd>
      </div>
    }
  </dl>
</section>
