<a class="hero-section-skip-link" href="#conteudo" i18n>Pular para o conteúdo</a>

<section id="inicio" class="hero-section" aria-labelledby="hero-title">
  <app-site-header [navigationItems]="navigationItems()" />

  <div class="hero-section-grid" aria-hidden="true"></div>
  <div class="hero-section-plane hero-section-plane--primary" aria-hidden="true"></div>
  <div class="hero-section-plane hero-section-plane--secondary" aria-hidden="true"></div>

  <div class="hero-section-content">
    <p class="hero-section-overline" i18n>Arquitetura e construção · São Caetano do Sul</p>
    <h1 id="hero-title" i18n>
      Espaços com
      <span>excelência</span>
      e propósito.
    </h1>
    <p class="hero-section-description" i18n>
      Entender seus objetivos, valorizar seus sonhos e transformá-los em arquitetura.
    </p>
    <div class="hero-section-actions">
      <a pButton class="hero-section-primary-link" href="#portfolio" i18n>Conheça o portfólio</a>
      <a pButton class="hero-section-secondary-link" href="#contato" i18n>Fale com Lucas</a>
    </div>
  </div>

  <a class="hero-section-scroll-cue" href="#conteudo" aria-label="Ir para o conteúdo" i18n-aria-label>
    <span aria-hidden="true"></span>
    <span i18n>Descubra</span>
  </a>
</section>
