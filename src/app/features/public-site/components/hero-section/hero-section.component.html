<a class="hero-section-skip-link" [href]="'#' + skipTarget()">{{ uiLabels().skipToContent }}</a>

<section [id]="config().anchor" class="hero-section" aria-labelledby="hero-title">
  <app-site-header [config]="headerConfig()" [navigationItems]="navigationItems()" [uiLabels]="uiLabels()"
    [logoPath]="logoPath()" />

  <img class="hero-section-image" [src]="backgroundPath()"
    [alt]="config().background.decorative ? '' : config().background.alt"
    [attr.aria-hidden]="config().background.decorative"
    [style.object-position]="config().background.focalPointX + '% ' + config().background.focalPointY + '%'" />
  <div class="hero-section-scrim" aria-hidden="true"></div>

  <div class="hero-section-content">
    <p class="hero-section-overline">{{ config().overline }}</p>
    <h1 id="hero-title"><app-rich-text [content]="config().title" /></h1>

    <div class="hero-section-bottom">
      <p><app-rich-text [content]="config().supportingText" /></p>
      <a class="hero-section-portfolio-link" [href]="config().portfolioLink.href"
        [attr.aria-label]="config().portfolioLink.ariaLabel ?? config().portfolioLink.label"
        [attr.target]="config().portfolioLink.target ?? '_self'"
        [attr.rel]="config().portfolioLink.target === '_blank' ? 'noopener noreferrer' : null">
        {{ config().portfolioLink.label }}
        <span class="public-site-arrow public-site-arrow--south-east" aria-hidden="true"></span>
      </a>
    </div>
  </div>

  <p class="hero-section-index" aria-hidden="true">{{ config().indexLabel }}</p>
  <p class="hero-section-caption">{{ config().caption }}</p>
</section>
