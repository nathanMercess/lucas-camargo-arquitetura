<section class="metrics-section" aria-label="Indicadores do escritório" i18n-aria-label>
  <p class="metrics-section-index" i18n>03 / Trajetória</p>
  <div class="metrics-section-grid">
    @for (metric of metrics(); track metric.id; let position = $index) {
      <article class="metrics-section-item" appRevealOnScroll [style.--reveal-delay]="position * 90 + 'ms'">
        <strong>{{ metric.value }}</strong>
        <span>{{ metric.label }}</span>
      </article>
    }
  </div>
</section>
