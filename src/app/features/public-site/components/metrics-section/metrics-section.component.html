<section [id]="config().anchor" class="metrics-section" [attr.aria-label]="config().ariaLabel">
  <p class="metrics-section-index">{{ config().indexLabel }}</p>
  <div class="metrics-section-grid">
    @for (metric of config().metrics; track metric.id; let position = $index) {
      <article class="metrics-section-item" appRevealOnScroll [style.--reveal-delay]="position * 90 + 'ms'">
        <strong>{{ metric.value }}</strong>
        <span>{{ metric.label }}</span>
      </article>
    }
  </div>
</section>
