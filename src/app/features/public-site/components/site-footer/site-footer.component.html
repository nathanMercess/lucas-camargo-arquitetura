<footer class="site-footer">
  <div class="site-footer-primary" appRevealOnScroll>
    <img class="site-footer-logo" [src]="logoPath()"
      [alt]="config().logo.decorative ? '' : config().logo.alt"
      [attr.aria-hidden]="config().logo.decorative" />
    <nav class="site-footer-links" [attr.aria-label]="uiLabels().footerNavigation">
      @for (link of config().links; track link.id) {
        <a [href]="link.href">{{ link.label }}</a>
      }
      @for (link of config().socialLinks; track link.id) {
        <a [href]="link.href" target="_blank" rel="noopener noreferrer" [attr.aria-label]="link.label">
          {{ link.label }}
        </a>
      }
    </nav>
  </div>

  <div class="site-footer-statement" appRevealOnScroll>
    <p>{{ config().statement }}</p>
  </div>

  <div class="site-footer-secondary">
    <p>© {{ currentYear }} {{ config().copyrightOwner }}</p>
    <p>{{ config().location }}</p>
    <a [href]="config().backToTopLink.href"
      [attr.aria-label]="config().backToTopLink.ariaLabel ?? config().backToTopLink.label"
      [attr.target]="config().backToTopLink.target ?? '_self'">
      {{ config().backToTopLink.label }}
      <span class="public-site-arrow public-site-arrow--north" aria-hidden="true"></span>
    </a>
  </div>
</footer>
