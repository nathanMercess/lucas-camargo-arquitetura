<footer class="site-footer">
  <div class="site-footer-primary">
    <img class="site-footer-logo" src="assets/brand/logo-light.png"
      alt="Lucas Camargo - Arquitetura e Construção" i18n-alt />
    <nav class="site-footer-links" aria-label="Links do rodapé" i18n-aria-label>
      @for (link of footerLinks(); track link.id) {
        <a [href]="link.href">{{ link.label }}</a>
      }
    </nav>
  </div>

  <div class="site-footer-secondary">
    <p i18n>Arquitetura que entende objetivos e valoriza sonhos.</p>
    <p>© {{ currentYear }} Lucas Camargo</p>
  </div>
</footer>
