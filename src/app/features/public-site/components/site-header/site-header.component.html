<header class="site-header" [class.site-header--menu-open]="isMenuOpen()">
  <a class="site-header-logo-link" [href]="config().homeLink.href"
    [attr.aria-label]="config().homeLink.ariaLabel ?? config().homeLink.label"
    [attr.target]="config().homeLink.target ?? '_self'" (click)="closeMenu()">
    <img class="site-header-logo" [src]="logoPath()" [alt]="config().logo.alt" />
  </a>

  <button #menuButton pButton class="site-header-menu-button" type="button" aria-controls="site-navigation"
    [attr.aria-expanded]="isMenuOpen()"
    [attr.aria-label]="isMenuOpen() ? uiLabels().closeMenu : uiLabels().openMenu"
    (click)="toggleMenu()">
    <span aria-hidden="true"></span>
    <span aria-hidden="true"></span>
  </button>

  <nav #navigation id="site-navigation" class="site-header-navigation"
    [attr.aria-label]="uiLabels().mainNavigation">
    @for (item of navigationItems(); track item.id) {
      <a class="site-header-navigation-link" [href]="item.href" (click)="closeMenu()">
        {{ item.label }}
      </a>
    }
    <a class="site-header-navigation-link site-header-navigation-cta" [href]="config().primaryCta.href"
      [attr.aria-label]="config().primaryCta.ariaLabel ?? config().primaryCta.label"
      [attr.target]="config().primaryCta.target ?? '_self'"
      [attr.rel]="config().primaryCta.target === '_blank' ? 'noopener noreferrer' : null"
      (click)="closeMenu()">
      {{ config().primaryCta.label }}
      <span class="public-site-arrow" aria-hidden="true"></span>
    </a>
  </nav>

  <a class="site-header-budget-link" [href]="config().primaryCta.href"
    [attr.aria-label]="config().primaryCta.ariaLabel ?? config().primaryCta.label"
    [attr.target]="config().primaryCta.target ?? '_self'"
    [attr.rel]="config().primaryCta.target === '_blank' ? 'noopener noreferrer' : null">
    {{ config().primaryCta.label }}
  </a>
</header>
